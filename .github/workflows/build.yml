name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build static site
        env:
          NITRO_PRESET: static
        run: npm run build

      - name: Locate build output
        id: locate
        run: |
          if [ -d ".output/public" ]; then
            echo "dir=.output/public" >> "$GITHUB_OUTPUT"
          elif [ -d "dist" ]; then
            echo "dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "No build output found" >&2
            ls -la
            exit 1
          fi

      - name: Ensure .nojekyll and required root files
        run: |
          OUT="${{ steps.locate.outputs.dir }}"
          touch "$OUT/.nojekyll"
          for f in favicon.ico og-image.png placeholder.svg robots.txt; do
            if [ -f "public/$f" ] && [ ! -f "$OUT/$f" ]; then
              cp "public/$f" "$OUT/$f"
            fi
          done
          ls -la "$OUT"

      - name: Deploy to gh-pages (only built output)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.locate.outputs.dir }}
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: static build"
